<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>User Dashboard - User Management System</title>
    <link rel='stylesheet' href='/static/style.css'>
</head>

<body class='user-body'>
    <div class='container'>
        <header>
            <h1>User Profile</h1>
            <button onclick='logout()'>Logout</button>
        </header>

        <section class='profile-info'>
            <div style='display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;'>
                <h2>Bilgileriniz</h2>
                <button onclick='showEditMeModal()'>Bilgileri Güncelle</button>
            </div>
            <div id='profile-data' class='profile-grid'>
            </div>
        </section>
    </div>

    <div id='user-modal' class='modal'>
        <div class='modal-content' style='max-height: 85vh; overflow-y: auto; padding-bottom: 40px;'>
            <span class='close' onclick='closeModal()'>&times;</span>
            <h2>Bilgileri Güncelle</h2>
            <form id='edit-me-form'>
                <div class='form-group'>
                    <label>İsim:</label>
                    <input type='text' id='first_name' required>
                </div>
                <div class='form-group'>
                    <label>Soyisim:</label>
                    <input type='text' id='last_name' required>
                </div>
                <div class='form-group'>
                    <label>Adres:</label>
                    <input type='text' id='address'>
                </div>
                <div class='form-group'>
                    <label>Pin Kodu:</label>
                    <input type='text' id='pin_code'>
                </div>
                <div class='form-group'>
                    <label>Telefon Numarası:</label>
                    <input type='text' id='phone'>
                </div>
                <div class='form-group'>
                    <label>Firma Adı:</label>
                    <input type='text' id='company_name'>
                </div>
                <div class='form-group'>
                    <label>Firma Adresi:</label>
                    <input type='text' id='company_address'>
                </div>
                <div style='margin-top: 30px; margin-bottom: 20px;'>
                    <button type='submit' style='width: 100%; padding: 14px; font-size: 1.1rem;'>Uygula</button>
                </div>
            </form>
        </div>
    </div>

    <script src='/static/app.js'></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadMe);
    </script>
</body>

</html>
